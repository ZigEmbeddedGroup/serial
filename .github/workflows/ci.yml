name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: "0.16.0"

      - name: Build
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Build examples
        run: zig build examples

      - name: Build docs
        run: zig build docs
